<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My BMW Club</title>
</head>
<style>
    body {
        background-color:skyblue; /* dark background */
        color: white text;     /*white text*/
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;     /*centers all text */
        padding: 50px;
    }
    car-card{
        background-color: rgb(69, 68, 68) ; /*dark gray box for the car */
        max-width: 500px;
        margin: auto;      /* canters the card on the screen */
        padding: 20px;
        border-radius: 12px; /*round the coners */
        box-shadow: 4px 15px;
    }
    img{
        background-color: blue; /*make the image fit perfectly insede the card*/
        border-radius: 8px;
        margin-top: 15px;
    }
    button{
        background-color: blue; /* Bmw blue button */
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 25px;
        margin-top: 20px;
    }
    button:hover{
        background-color: brown; /*turns m-power red when you hover over it*/
    }
</style>
<body>
    <div class="car-card" >
        <h1>Bmw m4 coupe</h1>
        <p>A high performance sport car with a twin-turbo engine and aggressive styling.</p>
        <img src="m4.jpeg" >
        <br>
        <button onclick="alert('booking feature coming soon !')">book a test drive</button>
    </div>
    <section class="specs">
        <div class="container grid-3">
            <div class="spec-card">
                <h2>503 hp</h2>
                <p>twin-power turbo inline 6</p>
        </div>
        <div class="specs-card">
            <h2>3.4s</h2>
            <p>0-60 mph acceleration</p>
        </div>
        <div class="spec-card">
            <h2>180 mph</h2>
            <p>top speed track</p>
        </div>
    </section>

    <section id="book form" class="booking-section">
        <div class="cointeiner from-box">
            <h2>experience the power</h2>
            <p>schedule your exclusive test drive below</p>

            <form action="#" method="post">
            <div class="form-group">
                <input type="text" placeholder="full name" required>
            </div>
            <div class="form-group">
                <input type="email" placeholder="email address" required>
            </div>
            <button type="submit" class="submit">submit request</button>
            </form>

        </div>

    </section>
</body>
